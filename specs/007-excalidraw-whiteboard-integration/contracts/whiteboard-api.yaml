openapi: 3.0.3
info:
  title: Mujarrad Whiteboard API
  description: |
    API contracts for whiteboard operations. These use existing Node/Attribute
    endpoints with whiteboard-specific data structures.
  version: 1.0.0

paths:
  /api/spaces/{spaceSlug}/nodes:
    get:
      summary: Get whiteboard elements
      description: Fetch all nodes that are whiteboard elements (have element_subtype)
      parameters:
        - name: spaceSlug
          in: path
          required: true
          schema:
            type: string
        - name: element_subtype
          in: query
          description: Filter for whiteboard elements only
          schema:
            type: string
            enum: [shape_rectangle, shape_ellipse, shape_diamond, text, drawing, image]
      responses:
        '200':
          description: List of whiteboard nodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/WhiteboardNode'

    post:
      summary: Create whiteboard element
      description: Create a new node representing a whiteboard element
      parameters:
        - name: spaceSlug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWhiteboardNodeRequest'
      responses:
        '201':
          description: Created whiteboard node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhiteboardNode'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/spaces/{spaceSlug}/nodes/{nodeId}:
    put:
      summary: Update whiteboard element
      description: Update an existing whiteboard element
      parameters:
        - name: spaceSlug
          in: path
          required: true
          schema:
            type: string
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWhiteboardNodeRequest'
      responses:
        '200':
          description: Updated whiteboard node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhiteboardNode'
        '404':
          description: Node not found

    delete:
      summary: Delete whiteboard element
      description: Delete a whiteboard element
      parameters:
        - name: spaceSlug
          in: path
          required: true
          schema:
            type: string
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Element deleted
        '404':
          description: Node not found

  /api/spaces/{spaceSlug}/attributes:
    get:
      summary: Get whiteboard connectors
      description: Fetch all attributes that represent whiteboard connectors
      parameters:
        - name: spaceSlug
          in: path
          required: true
          schema:
            type: string
        - name: attribute_key
          in: query
          schema:
            type: string
            enum: [connects_to]
      responses:
        '200':
          description: List of connector attributes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WhiteboardConnector'

  /api/nodes/{nodeId}/attributes:
    post:
      summary: Create whiteboard connector
      description: Create a relationship between whiteboard elements
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorRequest'
      responses:
        '201':
          description: Created connector
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhiteboardConnector'

components:
  schemas:
    WhiteboardNode:
      type: object
      required:
        - id
        - title
        - node_type
        - node_details
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 255
        content:
          type: string
        node_type:
          type: string
          enum: [CONTEXT, REGULAR, TEMPLATE, ASSUMPTION]
        node_details:
          $ref: '#/components/schemas/WhiteboardNodeDetails'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer

    WhiteboardNodeDetails:
      type: object
      required:
        - element_subtype
        - excalidraw_element
        - whiteboard_meta
      properties:
        element_subtype:
          type: string
          enum: [shape_rectangle, shape_ellipse, shape_diamond, text, drawing, image, frame]
        excalidraw_element:
          $ref: '#/components/schemas/ExcalidrawElement'
        whiteboard_meta:
          $ref: '#/components/schemas/WhiteboardMeta'

    ExcalidrawElement:
      type: object
      required:
        - id
        - type
        - x
        - y
      properties:
        id:
          type: string
        type:
          type: string
          enum: [rectangle, ellipse, diamond, text, arrow, line, freedraw, image, frame]
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        angle:
          type: number
        strokeColor:
          type: string
        backgroundColor:
          type: string
        fillStyle:
          type: string
          enum: [hachure, cross-hatch, solid]
        strokeWidth:
          type: number
        strokeStyle:
          type: string
          enum: [solid, dashed, dotted]
        roughness:
          type: number
        opacity:
          type: number
        groupIds:
          type: array
          items:
            type: string
        version:
          type: integer
        text:
          type: string
        fontSize:
          type: number
        points:
          type: array
          items:
            type: array
            items:
              type: number

    WhiteboardMeta:
      type: object
      required:
        - space_slug
        - created_at
        - last_modified
        - z_index
      properties:
        space_slug:
          type: string
        created_at:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        z_index:
          type: integer

    WhiteboardConnector:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_node_id:
          type: string
          format: uuid
        attribute_key:
          type: string
          enum: [connects_to]
        attribute_value:
          type: object
          properties:
            excalidraw_element:
              $ref: '#/components/schemas/ExcalidrawElement'
            connector_meta:
              type: object
              properties:
                source_element_id:
                  type: string
                target_element_id:
                  type: string
                bidirectional:
                  type: boolean
                label:
                  type: string

    CreateWhiteboardNodeRequest:
      type: object
      required:
        - title
        - node_type
        - node_details
      properties:
        title:
          type: string
          maxLength: 255
        content:
          type: string
        node_type:
          type: string
          enum: [REGULAR]
        node_details:
          $ref: '#/components/schemas/WhiteboardNodeDetails'

    UpdateWhiteboardNodeRequest:
      type: object
      required:
        - node_details
      properties:
        title:
          type: string
          maxLength: 255
        content:
          type: string
        node_details:
          $ref: '#/components/schemas/WhiteboardNodeDetails'

    CreateConnectorRequest:
      type: object
      required:
        - target_node_id
        - attribute_key
        - attribute_value
      properties:
        target_node_id:
          type: string
          format: uuid
        attribute_key:
          type: string
          enum: [connects_to]
        attribute_value:
          type: object

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
